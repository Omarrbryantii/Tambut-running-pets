<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 12px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #2b2b2b;
      color: #fff;
      margin: 0;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .goose-icon {
      font-size: 48px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      font-weight: bold;
    }
    button.on {
      background: #4caf50;
      color: #fff;
    }
    button.off {
      background: #f44336;
      color: #fff;
    }
