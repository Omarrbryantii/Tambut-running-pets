<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet Goose</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }
    #goose {
      position: absolute;
      font-size: 50px;
      transition: none;
      z-index: 10;
    }
    .footprint {
      position: absolute;
      font-size: 20px;
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="goose">🪿</div>
  <script>
    const goose = document.getElementById('goose');
    let config = {};
    let x = 100;
    let y = 100;
    let dx, dy;
    let lastDirectionChange = 0;

    fetch('config.json')
      .then(response => response.json())
      .then(data => {
        config = data;
        dx = config.speed;
        dy = config.speed;
        startBehavior();
      })
      .catch(err => {
        console.error('Failed to load config:', err);
        config = { speed: 2, honkFrequency: 5000, footprintDuration: 3000, mouseDragChance: 0.1 };
        dx = config.speed;
        dy = config.speed;
        startBehavior();
      });

    function startBehavior() {
      moveGoose();
      setInterval(() => {
        if (Math.random() < 0.1) { // 10% chance to change direction
          dx = (Math.random() - 0.5) * config.speed * 2;
          dy = (Math.random() - 0.5) * config.speed * 2;
        }
      }, 1000);

      setInterval(() => {
        console.log('Honk!');
        // Placeholder for sound
      }, config.honkFrequency);

      // Footprints every step
      setInterval(() => {
        const footprint = document.createElement('div');
        footprint.className = 'footprint';
        footprint.textContent = '🐾';
        footprint.style.left = x + 'px';
        footprint.style.top = y + 'px';
        document.body.appendChild(footprint);
        setTimeout(() => {
          document.body.removeChild(footprint);
        }, config.footprintDuration);
      }, 500);
    }

    function moveGoose() {
      x += dx;
      y += dy;

      if (x <= 0 || x >= window.innerWidth - 50) dx = -dx;
      if (y <= 0 || y >= window.innerHeight - 50) dy = -dy;

      goose.style.left = x + 'px';
      goose.style.top = y + 'px';

      setTimeout(moveGoose, 50);
    }
  </script>
</body>
</html>
